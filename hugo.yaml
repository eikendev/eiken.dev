baseURL: "https://www.eiken.dev/"
locale: "en-US"
title: "eikendev"
disableHugoGeneratorInject: true
enableRobotsTXT: true
enableGitInfo: true
pluralizeListTitles: false

taxonomies:
  tag: "tags"

services:
  rss:
    limit: 20

# JS dependencies live in node_modules; mount the individual files into assets
# so Hugo Pipes (js.Build) can process them. Defining any assets mount removes
# the default one, so it is re-declared explicitly below.
module:
  mounts:
    - source: assets
      target: assets
    - source: node_modules/bootstrap/dist/js/bootstrap.bundle.min.js
      target: assets/js/bootstrap.bundle.js
    - source: node_modules/chart.js/dist/chart.js
      target: assets/js/chart.js
    - source: node_modules/chart.js/dist/chunks/helpers.dataset.js
      target: assets/js/chunks/helpers.dataset.js
    - source: node_modules/@fortawesome/fontawesome-free/js/all.min.js
      target: assets/js/fontawesome.all.js
    - source: node_modules/zooming/build/zooming.min.js
      target: assets/js/zooming.min.js

params:
  title: "eikendev"
  description: "Coding projects and blog posts by eikendev. Always happy to learn something new. Also interested in infosec? Join my journey!"
  keywords: "coding, programming, projects, infosec, information security, system security, portfolio"
  images:
    - "/img/card.png"
  author:
    name: "eikendev"
    email: "hello@eiken.dev"
  social:
    github: "eikendev"
    gitlab: "eikendev"
    twitter: "eikendev"
    bluesky: "@eikendev.bsky.social"
    blueskyurl: "https://bsky.app/profile/eikendev.bsky.social"

permalinks:
  blog: "blog/:year/:month/:title/"

sitemap:
  changefreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

# https://jvns.ca/blog/2024/10/07/some-notes-on-upgrading-hugo/
markup:
  highlight:
    codeFences: true
    lineNos: true
    lineNumbersInTable: true
    noClasses: false
    tabWidth: 4
  goldmark:
    extensions:
      footnote: true
      strikethrough: true
      table: true
      taskList: true
      typographer:
        leftAngleQuote: "&lt;&lt;"
        rightAngleQuote: "&gt;&gt;"
      passthrough:
        delimiters:
          block:
          - - '\['
            - '\]'
          - - $$
            - $$
          inline:
          - - '\('
            - '\)'
        enable: true
    parser:
      autoHeadingIDType: "blackfriday"
    renderer:
      unsafe: true
